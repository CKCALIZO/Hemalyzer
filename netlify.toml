[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

# Redirect all routes to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables can also be set in Netlify Dashboard
# VITE_API_URL = "https://your-ngrok-url.ngrok-free.app"
